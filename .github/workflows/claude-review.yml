# .github/workflows/claude-review.yml
# =============================================================================
# ClaimFlow CI — Claude Code Review Pipeline
# =============================================================================
# Runs automatically on every pull request.
# Uses Claude Code non-interactively (-p flag) — no human needed.
# Fails the PR if any critical issues are found.
# =============================================================================

name: Claude Code Review

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**/*.ts'

jobs:
  claude-review:
    name: Claude Code Review (Non-Interactive)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      # ── STEP 1: Non-interactive mode verified by -p flag usage below ────────

      # ── STEP 3 + STEP 4 + STEP 6: Multi-pass, independent instances, structured output
      - name: Run Claude Code multi-pass review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./scripts/demo-multipass.sh

      # ── Upload structured findings as a CI artifact ──────────────────────────
      - name: Upload review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-review-report
          path: review-output/

